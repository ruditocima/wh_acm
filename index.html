<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        .table-compact th, .table-compact td { padding: 0.25rem 0.5rem; }
    </style>
</head>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyChPNI9RPXneZfjg0YyNCTlVDfSiEVdrKs",
    authDomain: "wms-acm.firebaseapp.com",
    projectId: "wms-acm",
    storageBucket: "wms-acm.firebasestorage.app",
    messagingSenderId: "427966771954",
    appId: "1:427966771954:web:e1cbec9d2dfc4684a4166b",
    databaseURL: "https://wms-acm-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  const app = initializeApp(firebaseConfig);
  window.fbDb = getDatabase(app);
  window.fbRef = ref; window.fbSet = set; window.fbGet = get; window.fbChild = child; window.fbRemove = remove;
  window.initApp = function() { loadFromFirebase(); };
</script>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="sticky top-0 z-50 bg-indigo-900 text-white p-6 rounded-t-xl shadow-lg flex justify-between items-center">
            <h1 class="text-2xl font-bold">Warehouse Management System</h1>
            <button onclick="renderDashboard()" class="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded text-[9pt] transition">Dashboard</button>
        </header>

        <main id="main-content" class="bg-white p-6 rounded-b-xl shadow-md min-h-[500px]"></main>
        
        <footer class="mt-6 text-[9pt] text-gray-500 text-left">&copy; 2026 Acero Cetha Metalindo.</footer>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-4xl shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 id="modal-title" class="text-[11pt] font-bold mb-4">Edit Data</h2>
            <div id="modal-body"><form id="data-form"></form></div>
            <div class="mt-6 flex justify-end space-x-3 border-t pt-4">
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300 text-[9pt]">Tutup</button>
                <div id="action-buttons" class="space-x-3">
                    <button id="btn-save" onclick="saveData(false)" class="px-4 py-2 bg-indigo-700 text-white rounded hover:bg-indigo-600 text-[9pt]">Simpan</button>
                    <button id="btn-selesai" onclick="saveAndPrint()" class="px-4 py-2 bg-green-700 text-white rounded hover:bg-green-600 text-[9pt]">Selesai & Print</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('wms_app_data')) || { "gudang":[], "project":[], "barang":[], "transaksi":[] };
        let currentSection = 'gudang';
        let editIndex = -1;

        function saveToLocal() { localStorage.setItem('wms_app_data', JSON.stringify(db)); }

        function saveAndPrint() {
            const form = document.getElementById('data-form');
            if(!form.checkValidity()) { form.reportValidity(); return; }
            
            // 1. Simpan data secara silent
            saveData(true);
            
            // 2. Ambil No Doc dari form
            const noDoc = form.querySelector('input[name="No Doc"]').value;
            
            // 3. Print PDF
            const items = db.transaksi.filter(x => x['No Doc'] === noDoc);
            if(items.length > 0) {
                printNotaPDF(items[0]);
                closeModal();
                renderDashboard();
            } else {
                alert("Gagal memproses print.");
            }
        }

        function saveData(silent = false) {
            const form = document.getElementById('data-form');
            if(!form.checkValidity()) { if(!silent) form.reportValidity(); return; }

            const formData = new FormData(form);
            let isNewInput = (editIndex === -1);

            if(currentSection === 'transaksi') {
                let docVal = formData.get('No Doc');
                let kats = formData.getAll('Kategori[]');
                let jens = formData.getAll('Jenis[]');
                let kbs = formData.getAll('Kode Barang[]');
                let nbs = formData.getAll('Nama Barang (Auto)[]');
                let jmls = formData.getAll('Jumlah[]');

                // Hapus data lama untuk No Doc ini jika edit
                if(!isNewInput) db.transaksi = db.transaksi.filter(x => x['No Doc'] !== db.transaksi[editIndex]['No Doc']);

                for(let i = 0; i < kats.length; i++){
                    if(!kbs[i]) continue;
                    db.transaksi.push({
                        "ID (Auto)": 'TX-' + Date.now() + i,
                        "Tanggal": formData.get('Tanggal'),
                        "No Doc": docVal,
                        "Tipe Transaksi": formData.get('Tipe Transaksi'),
                        "Gudang Asal": formData.get('Gudang Asal'),
                        "Gudang Tujuan": formData.get('Gudang Tujuan'),
                        "Kode Project": formData.get('Kode Project'),
                        "Kategori": kats[i],
                        "Jenis": jens[i],
                        "Kode Barang": kbs[i],
                        "Nama Barang (Auto)": nbs[i],
                        "Jumlah": parseInt(jmls[i] || 0),
                        "Petugas": formData.get('Petugas'),
                        "Keterangan": formData.get('Keterangan')
                    });
                }
            } else {
                let newItem = {};
                for (let [key, value] of formData.entries()) { newItem[key] = value; }
                if (isNewInput) db[currentSection].push(newItem);
                else db[currentSection][editIndex] = newItem;
            }

            saveToLocal();
            syncToFirebase();
            if(!silent) { closeModal(); renderDashboard(); }
        }

        /* --- FUNGSI UTILITAS --- */
        function renderDashboard() {
            document.getElementById('main-content').innerHTML = `
                <h2 class="text-2xl font-bold mb-6">Dashboard Utama</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <button onclick="renderTable('gudang')" class="p-6 bg-blue-700 text-white rounded-lg shadow hover:bg-blue-600">Master Gudang</button>
                    <button onclick="renderTable('project')" class="p-6 bg-green-700 text-white rounded-lg shadow hover:bg-green-600">Master Project</button>
                    <button onclick="renderTable('barang')" class="p-6 bg-yellow-600 text-white rounded-lg shadow hover:bg-yellow-500">Master Barang</button>
                    <button onclick="renderTable('transaksi')" class="p-6 bg-red-700 text-white rounded-lg shadow hover:bg-red-600">Data Transaksi</button>
                    <button onclick="currentSection = 'transaksi'; openModal(-1);" class="p-6 bg-teal-700 text-white rounded-lg shadow hover:bg-teal-600">Input Transaksi</button>
                </div>
            `;
        }

        function renderTable(section) {
            currentSection = section;
            let html = `
                <div class="sticky top-20 z-40 bg-white pt-2 pb-4 mb-4 flex justify-between items-center border-b">
                    <h2 class="text-[9pt] font-bold capitalize">${section}</h2>
                    <button onclick="openModal(-1)" class="bg-indigo-700 text-white px-4 py-2 rounded text-[9pt]"> + Tambah</button>
                </div>
                <div class="overflow-x-auto"><table class="w-full border-collapse border text-[9pt]"><thead><tr class="bg-gray-100">`;
            
            if(db[section].length > 0) {
                Object.keys(db[section][0]).forEach(k => html += `<th class="border p-2">${k}</th>`);
                html += `<th class="border p-2">Aksi</th></tr></thead><tbody>`;
                db[section].forEach((item, index) => {
                    html += `<tr>`;
                    Object.values(item).forEach(v => html += `<td class="border p-2">${v}</td>`);
                    html += `<td class="border p-2"><button onclick="openModal(${index})" class="text-blue-600">Edit</button></td></tr>`;
                });
            }
            html += `</tbody></table></div>`;
            document.getElementById('main-content').innerHTML = html;
        }

        function openModal(index) {
            editIndex = index;
            const form = document.getElementById('data-form');
            form.innerHTML = '';
            document.getElementById('modal').classList.remove('hidden');
            
            if(currentSection === 'transaksi') {
                document.getElementById('btn-selesai').classList.remove('hidden');
                let item = index === -1 ? {} : db.transaksi[index];
                form.innerHTML = `
                    <div class="grid grid-cols-2 gap-3 mb-4 bg-gray-50 p-3 rounded">
                        <div><label class="block text-[8pt]">Tanggal</label><input type="date" name="Tanggal" value="${item['Tanggal'] || new Date().toISOString().split('T')[0]}" class="w-full border p-1 rounded text-right" required></div>
                        <div><label class="block text-[8pt]">No Doc</label><input type="text" name="No Doc" value="${item['No Doc'] || 'DOC-'+Date.now()}" class="w-full border p-1 rounded" required></div>
                        <div><label class="block text-[8pt]">Tipe</label><select name="Tipe Transaksi" class="w-full border p-1 rounded"><option>Masuk</option><option>Keluar</option></select></div>
                    </div>
                    <table class="w-full border-collapse border mt-4">
                        <thead><tr class="bg-gray-200"><th class="border p-1 text-[8pt]">Kategori</th><th class="border p-1 text-[8pt]">Jenis</th><th class="border p-1 text-[8pt]">Kode</th><th class="border p-1 text-[8pt]">Nama</th><th class="border p-1 text-[8pt]">Qty</th><th class="border p-1 text-[8pt]">X</th></tr></thead>
                        <tbody id="item-tbody"></tbody>
                    </table>
                `;
                if(index === -1) {
                    for(let i=0; i<5; i++) addTransactionRow();
                } else {
                    addTransactionRow(item);
                }
            } else {
                document.getElementById('btn-selesai').classList.add('hidden');
                // Form input master biasa
            }
        }

        function addTransactionRow(item = {}) {
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="border p-1"><select name="Kategori[]" onchange="onKategoriChangeRow(this)" class="w-full text-[8pt]"><option value="${item['Kategori']||''}">${item['Kategori']||'Pilih'}</option></select></td>
                <td class="border p-1"><select name="Jenis[]" onchange="onJenisChangeRow(this)" class="w-full text-[8pt]"><option value="${item['Jenis']||''}">${item['Jenis']||'Pilih'}</option></select></td>
                <td class="border p-1"><select name="Kode Barang[]" onchange="updateNamaBarangRow(this)" class="w-full text-[8pt]"><option value="${item['Kode Barang']||''}">${item['Kode Barang']||'Pilih'}</option></select></td>
                <td class="border p-1"><input type="text" name="Nama Barang (Auto)[]" value="${item['Nama Barang (Auto)']||''}" class="w-full text-[8pt]" readonly></td>
                <td class="border p-1"><input type="number" name="Jumlah[]" value="${item['Jumlah']||''}" class="w-full text-[8pt]"></td>
                <td class="border p-1 text-center"><button type="button" onclick="this.closest('tr').remove()" class="text-red-500">x</button></td>
            `;
            document.getElementById('item-tbody').appendChild(tr);
        }

        function printNotaPDF(t) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("NOTA TRANSAKSI", 20, 20);
            doc.text("No Doc: " + t['No Doc'], 20, 30);
            doc.text("Tanggal: " + t['Tanggal'], 20, 40);
            
            let body = db.transaksi.filter(x => x['No Doc'] === t['No Doc']).map(x => [x['Nama Barang (Auto)'], x['Jumlah']]);
            doc.autoTable({ head: [['Barang', 'Qty']], body: body, startY: 50 });
            doc.save('Nota_'+t['No Doc']+'.pdf');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function syncToFirebase() { fbSet(fbRef(fbDb, 'data_aplikasi'), db); }
        function loadFromFirebase() { fbGet(fbChild(fbRef(fbDb), 'data_aplikasi')).then(snap => { if(snap.exists()) { db = snap.val(); renderDashboard(); } }); }
        
        renderDashboard();
    </script>
</body>
</html>
