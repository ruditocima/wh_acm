<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Pergudangan ACM Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Memperkecil padding tabel agar lebar kolom proporsional menyesuaikan huruf 9pt */
        .table-compact th, .table-compact td { padding: 0.25rem 0.5rem; }
    </style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyChPNI9RPXneZfjg0YyNCTlVDfSiEVdrKs",
    authDomain: "wms-acm.firebaseapp.com",
    projectId: "wms-acm",
    storageBucket: "wms-acm.firebasestorage.app",
    messagingSenderId: "427966771954",
    appId: "1:427966771954:web:e1cbec9d2dfc4684a4166b",
    databaseURL: "https://wms-acm-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  const app = initializeApp(firebaseConfig);
  
  // Ekspor fungsi Firebase ke global (window) agar bisa dipakai skrip di bawahnya
  window.fbDb = getDatabase(app);
  window.fbRef = ref;
  window.fbSet = set;
  window.fbGet = get;
  window.fbChild = child;
  window.fbRemove = remove;

window.syncToGoogleSheet = function(item, section) {
      if (section !== 'transaksi') return; 

      const scriptUrl = 'https://script.google.com/macros/s/AKfycbxLyNZ-VTdwY-RGTPw0WufiQzPPnqF5unlTG8sKsGFVA4hXbd9JpaylKWJpV5ujXolgGg/exec'; 

      fetch(scriptUrl, {
          method: 'POST',
          body: JSON.stringify({
              section: section,
              item: item
          })
      })
      .then(response => response.json())
      .then(data => console.log('Berhasil kirim ke Spreadsheet:', data))
      .catch(error => console.error('Gagal kirim ke Spreadsheet:', error));
  }
  // Beri tahu skrip utama bahwa Firebase sudah siap dieksekusi
  if (typeof window.initApp === 'function') {
      window.initApp();
  }
    window.initApp = function() {
    loadFromFirebase();
    };
</script>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="bg-indigo-900 text-white p-6 rounded-t-xl shadow-lg flex justify-between items-center">
            <h1 class="text-2xl font-bold">Warehouse Management System</h1>
            <button onclick="renderDashboard()" class="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded text-[9pt] transition">Dashboard</button>
        </header>

        <main id="main-content" class="bg-white p-6 rounded-b-xl shadow-md min-h-[500px]">
        </main>
        
        <!-- Penambahan Footer Sesuai Permintaan 1 -->
        <footer class="mt-6 text-[9pt] text-gray-500 text-left">
            &copy; 2026 Acero Cetha Metalindo. Hak Cipta Dilindungi.
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-2xl shadow-2xl max-h-[80vh] overflow-y-auto">
            <h2 id="modal-title" class="text-[9pt] font-bold mb-4">Edit Data</h2>
            <div id="modal-body">
                <form id="data-form"></form>
            </div>
            <div class="mt-6 flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300 text-[9pt]">Tutup</button>
                <button id="btn-save" onclick="saveData()" class="px-4 py-2 bg-indigo-700 text-white rounded hover:bg-indigo-600 text-[9pt]">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const initialData = {
            "gudang": [{"Kode Gudang": "GDG-01", "Nama Gudang": "Gudang Pusat"}, {"Kode Gudang": "GDG-02", "Nama Gudang": "Gudang Cabang"}],
            "project": [{"Kode Project": "PRJ-001", "Nama Project": "Proyek A"}],
            // Permintaan 2: Posisi kolom Master Barang diatur berurutan
            "barang": [
                {"Kategori": "Material", "Jenis": "Besi", "Kode Barang": "BRG-001", "Nama Barang": "Besi Beton"}, 
                {"Kategori": "Material", "Jenis": "Semen", "Kode Barang": "BRG-002", "Nama Barang": "Semen Tiga Roda"},
                {"Kategori": "Tools", "Jenis": "Obeng", "Kode Barang": "BRG-003", "Nama Barang": "Obeng Plus"}
            ],
            "transaksi": [
                {
                    "ID (Auto)": "TX-001", 
                    "Tanggal": "2026-07-16", 
                    "No Doc": "DOC-ACM-849201", 
                    "Tipe Transaksi": "Masuk", 
                    "Gudang Asal": "", 
                    "Gudang Tujuan": "GDG-01", 
                    "Kode Project": "PRJ-001", 
                    "Kategori": "Material", 
                    "Jenis": "Besi", 
                    "Kode Barang": "BRG-001", 
                    "Nama Barang (Auto)": "Besi Beton", 
                    "Jumlah": 100,
                    "Petugas": "Budi", 
                    "Keterangan": "Stok awal proyek" 
                }
            ]
        };
        
        let db = JSON.parse(localStorage.getItem('wms_app_data')) || initialData;
        let currentSection = 'gudang';
        let editIndex = -1;

        function saveToLocal() { localStorage.setItem('wms_app_data', JSON.stringify(db)); }

        function deleteData(index) {
            if(confirm("Yakin ingin menghapus data ini?")) {
                db[currentSection].splice(index, 1);
                saveToLocal();
                renderTable(currentSection);
            }
        }

        function exportCSV() {
            let data = db[currentSection];
            if (data.length === 0) return alert("Tidak ada data untuk diexport!");
            let csv = Object.keys(data[0]).join(',') + '\n';
            data.forEach(row => {
                csv += Object.values(row).map(val => `"${val}"`).join(',') + '\n';
            });
            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = currentSection + '.csv';
            a.click();
        }

        function renderDashboard() {
            document.getElementById('main-content').innerHTML = `
                <h2 class="text-2xl font-bold mb-6">Dashboard Utama</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <button onclick="renderTable('gudang')" class="p-6 bg-blue-700 text-white rounded-lg shadow hover:bg-blue-600">Master Gudang</button>
                    <button onclick="renderTable('project')" class="p-6 bg-green-700 text-white rounded-lg shadow hover:bg-green-600">Master Project</button>
                    <button onclick="renderTable('barang')" class="p-6 bg-yellow-600 text-white rounded-lg shadow hover:bg-yellow-500">Master Barang</button>
                    <button onclick="renderTable('transaksi')" class="p-6 bg-red-700 text-white rounded-lg shadow hover:bg-red-600">Data Transaksi</button>
                    <button onclick="renderRekapStok()" class="p-6 bg-purple-700 text-white rounded-lg shadow hover:bg-purple-600">Stok Gudang</button>
                    <button onclick="renderRekapStokProyek()" class="p-6 bg-pink-700 text-white rounded-lg shadow hover:bg-pink-600">Stok Proyek</button>
                    <button onclick="currentSection = 'transaksi'; openModal(-1);" class="p-6 bg-teal-700 text-white rounded-lg shadow hover:bg-teal-600">Input Transaksi</button>
                </div>
            `;
        }

    function renderTable(section) {
    currentSection = section;
    
    if (section === 'transaksi') {
        db[section].sort((a, b) => new Date(b['Tanggal'] || 0) - new Date(a['Tanggal'] || 0));
    } else if (section === 'barang') {
       // Mengurutkan Ascending berdasarkan Kategori, lalu Jenis
        db[section].sort((a, b) => {
            let catA = (a['Kategori'] || "").toLowerCase();
            let catB = (b['Kategori'] || "").toLowerCase();
            let jenisA = (a['Jenis'] || "").toLowerCase();
            let jenisB = (b['Jenis'] || "").toLowerCase();

            // Urutkan Kategori terlebih dahulu
            if (catA < catB) return -1;
            if (catA > catB) return 1;
            
            // Jika Kategori sama, urutkan berdasarkan Jenis
            if (jenisA < jenisB) return -1;
            if (jenisA > jenisB) return 1;
            
            return 0;
        });
    }
    
    let data = db[section];
            let exportBtn = (section === 'transaksi' || section === 'barang') ? `<button onclick="exportCSV()" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-500 mr-2 text-[9pt]">Export CSV</button>` : '';
            
            let html = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-[9pt] font-bold capitalize text-gray-800">${section.replace('_', ' ')}</h2>
                    <div>
                        ${exportBtn}
                        <button onclick="openModal(-1)" class="bg-indigo-700 text-white px-4 py-2 rounded shadow hover:bg-indigo-600 text-[9pt]"> + Tambah Data</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse border border-gray-200 table-compact">
                        <thead class="bg-gray-50"><tr>`;
            
            if (data.length > 0) {
                // Untuk urutan header menggunakan urutan dari object property
                Object.keys(data[0]).forEach(k => html += `<th class="border text-[9pt] font-bold uppercase text-gray-600">${k}</th>`);
                html += `<th class="border text-[9pt] font-bold uppercase text-gray-600">Aksi</th></tr></thead><tbody>`;

                data.forEach((item, index) => {
                    html += `<tr class="hover:bg-gray-50 border-b">`;
                    Object.values(item).forEach(v => html += `<td class="border text-[9pt] text-gray-800">${v}</td>`);
                    
                    let aksi = `<button onclick="openModal(${index})" class="text-blue-600 hover:underline text-[9pt] font-bold">Edit</button>`;
                    if (section === 'barang' || section === 'transaksi') {
                        aksi += ` | <button onclick="deleteData(${index})" class="text-red-600 hover:underline text-[9pt] font-bold">Hapus</button>`;
                    }
                    html += `<td class="border">${aksi}</td></tr>`;
                });
            } else {
                let defaultKeys = [];
                // Default keys untuk Master Barang saat kosong (Permintaan 2)
                if(section === 'barang') defaultKeys = ["Kategori", "Jenis", "Kode Barang", "Nama Barang"];
                else if(section === 'transaksi') defaultKeys = ["ID (Auto)", "Tanggal", "No Doc", "Tipe Transaksi", "Gudang Asal", "Gudang Tujuan", "Kode Project", "Kategori", "Jenis", "Kode Barang", "Nama Barang (Auto)", "Jumlah", "Petugas", "Keterangan"];
                else if(section === 'gudang') defaultKeys = ["Kode Gudang", "Nama Gudang"];
                else if(section === 'project') defaultKeys = ["Kode Project", "Nama Project"];

                defaultKeys.forEach(k => html += `<th class="border text-[9pt] font-bold uppercase text-gray-600">${k}</th>`);
                html += `<th class="border text-[9pt] font-bold uppercase text-gray-600">Aksi</th></tr></thead><tbody><tr><td colspan="${defaultKeys.length + 1}" class="text-center p-4 text-gray-400">Tidak ada data</td></tr>`;
            }
            html += `</tbody></table></div>`;
            document.getElementById('main-content').innerHTML = html;
        }

        function generateProjectCode() {
            if (!db.project || db.project.length === 0) return 'PRJ-001';
            let maxNum = 0;
            db.project.forEach(p => {
                let code = p['Kode Project'];
                if (code && code.startsWith('PRJ-')) {
                    let num = parseInt(code.replace('PRJ-', ''), 10);
                    if (!isNaN(num) && num > maxNum) maxNum = num;
                }
            });
            let nextNum = maxNum + 1;
            return 'PRJ-' + nextNum.toString().padStart(3, '0');
        }
        
        function generateUniqueDocCode() {
            let isUnique = false;
            let code = '';
            while(!isUnique) {
                let rand = Math.floor(100000 + Math.random() * 900000); 
                code = `DOC-ACM-${rand}`;
                isUnique = !db.transaksi.some(t => t['No Doc'] === code);
            }
            return code;
        }

        function onTanggalChange(val) {
            const docInput = document.querySelector('input[name="No Doc"]');
            if (docInput && val && !docInput.value) {
                docInput.value = generateUniqueDocCode();
            }
        }

        function onKategoriChange(kategoriVal) {
            const jenisSelect = document.querySelector('select[name="Jenis"]');
            const kodeSelect = document.querySelector('select[name="Kode Barang"]');
            const namaInput = document.querySelector('input[name="Nama Barang (Auto)"]');
            
            if (!jenisSelect) return;
            
            jenisSelect.innerHTML = '<option value="">-- Pilih Jenis --</option>';
            if(kodeSelect) kodeSelect.innerHTML = '<option value="">-- Pilih Barang --</option>';
            if(namaInput) namaInput.value = '';

            if (kategoriVal) {
                let filteredJenis = [...new Set(db.barang.filter(b => b['Kategori'] === kategoriVal).map(b => b['Jenis']))];
                filteredJenis.forEach(j => {
                    jenisSelect.innerHTML += `<option value="${j}">${j}</option>`;
                });
            }
        }

        function onJenisChange(jenisVal) {
            const kategoriVal = document.querySelector('select[name="Kategori"]')?.value;
            const kodeSelect = document.querySelector('select[name="Kode Barang"]');
            const namaInput = document.querySelector('input[name="Nama Barang (Auto)"]');

            if (!kodeSelect) return;

            kodeSelect.innerHTML = '<option value="">-- Pilih Barang --</option>';
            if(namaInput) namaInput.value = '';

            if (jenisVal && kategoriVal) {
                let filteredBarang = db.barang.filter(b => b['Kategori'] === kategoriVal && b['Jenis'] === jenisVal);
                filteredBarang.forEach(b => {
                    kodeSelect.innerHTML += `<option value="${b['Kode Barang']}">${b['Kode Barang']} - ${b['Nama Barang']}</option>`;
                });
            }
        }

        function updateNamaBarang(kode) {
            const barang = db.barang.find(b => b['Kode Barang'] === kode);
            const namaInput = document.querySelector('input[name="Nama Barang (Auto)"]');
            if (namaInput) namaInput.value = barang ? barang['Nama Barang'] : '';
        }

        function renderRekapStok() {
            const selectedGudang = document.getElementById('gudang-filter')?.value || "";
            let rekap = {};
            db.transaksi.forEach(t => {
                let nama = t['Nama Barang (Auto)'] || '-';
                let jml = parseInt(t['Jumlah'] || 0);
                if(!rekap[nama]) rekap[nama] = { masuk: 0, keluar: 0, t_masuk: 0, t_keluar: 0 };
                let isGudangRelevant = (selectedGudang === "" || t['Gudang Asal'] === selectedGudang || t['Gudang Tujuan'] === selectedGudang);
                if(isGudangRelevant) {
                    if(t['Tipe Transaksi'] === 'Masuk' && (selectedGudang === "" || t['Gudang Tujuan'] === selectedGudang)) rekap[nama].masuk += jml;
                    if(t['Tipe Transaksi'] === 'Keluar' && (selectedGudang === "" || t['Gudang Asal'] === selectedGudang)) rekap[nama].keluar += jml;
                    if(t['Tipe Transaksi'] === 'Transfer') {
                        if(t['Gudang Tujuan'] === selectedGudang || selectedGudang === "") rekap[nama].t_masuk += jml;
                        if(t['Gudang Asal'] === selectedGudang || selectedGudang === "") rekap[nama].t_keluar += jml;
                    }
                }
            });

            let options = db.gudang.map(g => `<option value="${g['Kode Gudang']}" ${selectedGudang === g['Kode Gudang'] ? 'selected' : ''}>${g['Nama Gudang']}</option>`).join('');
            let html = `<div class="mb-6"><h2 class="text-[9pt] font-bold mb-4">Rekap Stok Gudang</h2><label class="block text-[9pt] font-medium text-gray-700 mb-1">Pilih Gudang:</label><select id="gudang-filter" onchange="renderRekapStok()" class="w-full md:w-1/3 border p-2 rounded text-[9pt]"><option value="">-- Semua Gudang --</option>${options}</select></div><div class="overflow-x-auto"><table class="w-full text-left border-collapse border border-gray-200 table-compact"><thead class="bg-gray-50"><tr><th class="border text-[9pt] font-bold uppercase text-gray-600">Nama Barang</th><th class="border text-[9pt] font-bold uppercase text-gray-600">Masuk</th><th class="border text-[9pt] font-bold uppercase text-gray-600">Keluar</th><th class="border text-[9pt] font-bold uppercase text-gray-600">T. Masuk</th><th class="border text-[9pt] font-bold uppercase text-gray-600">T. Keluar</th><th class="border text-[9pt] font-bold uppercase text-gray-600">Sisa</th></tr></thead><tbody>`;
            for(let nama in rekap) {
                let sisa = rekap[nama].masuk - rekap[nama].keluar + rekap[nama].t_masuk - rekap[nama].t_keluar;
                html += `<tr><td class="border text-[9pt] font-medium">${nama}</td><td class="border text-[9pt]">${rekap[nama].masuk}</td><td class="border text-[9pt]">${rekap[nama].keluar}</td><td class="border text-[9pt]">${rekap[nama].t_masuk}</td><td class="border text-[9pt]">${rekap[nama].t_keluar}</td><td class="border text-[9pt] font-bold text-blue-600 underline cursor-pointer hover:text-blue-800" onclick="showBreakdown('${nama}')">${sisa}</td></tr>`;
            }
            html += `</tbody></table></div>`;
            document.getElementById('main-content').innerHTML = html;
        }

        function showBreakdown(namaBarang) {
            const selectedGudang = document.getElementById('gudang-filter')?.value || "";
            let breakdown = {};
            db.transaksi.forEach(t => {
                if(t['Nama Barang (Auto)'] === namaBarang) {
                    let isGudangRelevant = (selectedGudang === "" || t['Gudang Asal'] === selectedGudang || t['Gudang Tujuan'] === selectedGudang);
                    if(isGudangRelevant) {
                        let kode = t['Kode Barang'];
                        if(!breakdown[kode]) breakdown[kode] = 0;
                        let jml = parseInt(t['Jumlah'] || 0);
                        if(t['Tipe Transaksi'] === 'Masuk' && (selectedGudang === "" || t['Gudang Tujuan'] === selectedGudang)) breakdown[kode] += jml;
                        if(t['Tipe Transaksi'] === 'Keluar' && (selectedGudang === "" || t['Gudang Asal'] === selectedGudang)) breakdown[kode] -= jml;
                        if(t['Tipe Transaksi'] === 'Transfer') {
                            if(t['Gudang Tujuan'] === selectedGudang || selectedGudang === "") breakdown[kode] += jml;
                            if(t['Gudang Asal'] === selectedGudang || selectedGudang === "") breakdown[kode] -= jml;
                        }
                    }
                }
            });
            document.getElementById('modal-title').innerText = `Breakdown Stok: ${namaBarang}`;
            document.getElementById('btn-save').classList.add('hidden');
            let html = `<div class="overflow-x-auto"><table class="w-full text-left border-collapse border border-gray-200 text-[9pt] table-compact"><thead class="bg-gray-100"><tr><th class="border text-[9pt] font-bold uppercase text-gray-600">Kode Barang</th><th class="border text-[9pt] font-bold uppercase text-gray-600">Total Sisa</th></tr></thead><tbody>`;
            for(let kode in breakdown) { html += `<tr><td class="border text-[9pt] font-medium">${kode}</td><td class="border text-[9pt] font-bold">${breakdown[kode]}</td></tr>`; }
            html += `</tbody></table></div>`;
            document.getElementById('data-form').innerHTML = html;
            document.getElementById('modal').classList.remove('hidden');
        }

        function renderRekapStokProyek() {
            const selectedProject = document.getElementById('project-filter')?.value || "";
            let rekap = {};
            db.transaksi.forEach(t => {
                if (selectedProject !== "" && t['Kode Project'] !== selectedProject) return;
                let nama = t['Nama Barang (Auto)'] || '-';
                let jml = parseInt(t['Jumlah'] || 0);
                if(!rekap[nama]) rekap[nama] = { masuk: 0, keluar: 0 };
                if(t['Tipe Transaksi'] === 'Masuk') rekap[nama].masuk += jml;
                if(t['Tipe Transaksi'] === 'Keluar') rekap[nama].keluar += jml;
            });
            let options = db.project.map(p => `<option value="${p['Kode Project']}" ${selectedProject === p['Kode Project'] ? 'selected' : ''}>${p['Nama Project']}</option>`).join('');
            let html = `<div class="mb-6"><h2 class="text-[9pt] font-bold mb-4">Rekap Stok Proyek</h2><label class="block text-[9pt] font-medium text-gray-700 mb-1">Pilih Proyek:</label><select id="project-filter" onchange="renderRekapStokProyek()" class="w-full md:w-1/3 border p-2 rounded text-[9pt]"><option value="">-- Semua Proyek --</option>${options}</select></div><div class="overflow-x-auto"><table class="w-full text-left border-collapse border border-gray-200 table-compact"><thead class="bg-gray-50"><tr><th class="border text-[9pt] font-bold uppercase text-gray-600">Nama Barang</th><th class="border text-[9pt] font-bold uppercase text-gray-600">Total Masuk</th><th class="border text-[9pt] font-bold uppercase text-gray-600">Total Keluar</th><th class="border text-[9pt] font-bold uppercase text-gray-600">Netto</th></tr></thead><tbody>`;
            for(let nama in rekap) {
                let netto = rekap[nama].masuk - rekap[nama].keluar;
                html += `<tr><td class="border text-[9pt] font-medium">${nama}</td><td class="border text-[9pt]">${rekap[nama].masuk}</td><td class="border text-[9pt]">${rekap[nama].keluar}</td><td class="border text-[9pt] font-bold ${netto < 0 ? 'text-red-600' : 'text-green-600'}">${netto}</td></tr>`;
            }
            html += `</tbody></table></div>`;
            document.getElementById('main-content').innerHTML = html;
        }

        function openModal(index) {
            editIndex = index;
            document.getElementById('btn-save').classList.remove('hidden');
            const form = document.getElementById('data-form');
            
            if (currentSection === 'transaksi') {
                form.className = "grid grid-cols-3 gap-4 text-[9pt]";
            } else {
                form.className = "grid grid-cols-2 gap-4 text-[9pt]";
            }
            
            form.innerHTML = '';
            
            let keys = [];
            if (currentSection === 'barang') {
                // Posisi kolom di Input Modal diurutkan sesuai Permintaan 2
                keys = ['Kategori', 'Jenis', 'Kode Barang', 'Nama Barang'];
            } else if (currentSection === 'transaksi') {
                keys = ['ID (Auto)', 'Tanggal', 'No Doc', 'Tipe Transaksi', 'Gudang Asal', 'Gudang Tujuan', 'Kode Project', 'Kategori', 'Jenis', 'Kode Barang', 'Nama Barang (Auto)', 'Jumlah', 'Petugas', 'Keterangan'];
            } else {
                keys = db[currentSection].length > 0 ? Object.keys(db[currentSection][0]) : [];
            }

            const item = index === -1 ? {} : db[currentSection][index];
            document.getElementById('modal-title').innerText = index === -1 ? 'Tambah Data' : 'Edit Data';
            
            keys.forEach(key => {
                let inputHtml = '';
                
                if (currentSection === 'barang') {
                    inputHtml = `<input type="text" name="${key}" value="${item[key] || ''}" class="w-full border p-2 rounded text-[9pt]" required>`;
                } 
                else if (currentSection === 'transaksi') {
                    if (key === 'Tanggal') {
                        inputHtml = `<input type="date" name="${key}" value="${item[key] || new Date().toISOString().split('T')[0]}" onchange="onTanggalChange(this.value)" class="w-full border p-2 rounded text-[9pt]" required>`;
                    } else if (key === 'No Doc') {
                        let initialDoc = item[key];
                        if (index === -1 && !initialDoc) {
                            initialDoc = generateUniqueDocCode(); 
                        }
                        inputHtml = `<input type="text" name="${key}" value="${initialDoc}" class="w-full border p-2 rounded text-[9pt]" required>`;
                    } else if (key === 'Tipe Transaksi') {
                        inputHtml = `<select name="${key}" class="w-full border p-2 rounded text-[9pt]">
                            <option value="Masuk" ${item[key] === 'Masuk' ? 'selected' : ''}>Masuk</option>
                            <option value="Keluar" ${item[key] === 'Keluar' ? 'selected' : ''}>Keluar</option>
                            <option value="Transfer" ${item[key] === 'Transfer' ? 'selected' : ''}>Transfer</option>
                        </select>`;
                    } else if (key === 'Gudang Asal' || key === 'Gudang Tujuan') {
                        inputHtml = `<select name="${key}" class="w-full border p-2 rounded text-[9pt]">
                            <option value="">-- Pilih --</option>
                            ${db.gudang.map(g => `<option value="${g['Kode Gudang']}" ${item[key] === g['Kode Gudang'] ? 'selected' : ''}>${g['Nama Gudang']}</option>`).join('')}
                        </select>`;
                    } else if (key === 'Kode Project') {
                        inputHtml = `<select name="${key}" class="w-full border p-2 rounded text-[9pt]">
                            <option value="">-- Pilih --</option>
                            ${db.project.map(p => `<option value="${p['Kode Project']}" ${item[key] === p['Kode Project'] ? 'selected' : ''}>${p['Kode Project']} - ${p['Nama Project']}</option>`).join('')}
                        </select>`;
                    } else if (key === 'Kategori') {
                        let categories = [...new Set(db.barang.map(b => b['Kategori']))];
                        inputHtml = `<select name="${key}" onchange="onKategoriChange(this.value)" class="w-full border p-2 rounded text-[9pt]" required>
                            <option value="">-- Pilih Kategori --</option>
                            ${categories.map(c => `<option value="${c}" ${item[key] === c ? 'selected' : ''}>${c}</option>`).join('')}
                        </select>`;
                    } else if (key === 'Jenis') {
                        inputHtml = `<select name="${key}" onchange="onJenisChange(this.value)" class="w-full border p-2 rounded text-[9pt]" required>
                            <option value="">-- Pilih Jenis --</option>
                        </select>`;
                    } else if (key === 'Kode Barang') {
                        inputHtml = `<select name="${key}" onchange="updateNamaBarang(this.value)" class="w-full border p-2 rounded text-[9pt]" required>
                            <option value="">-- Pilih Barang --</option>
                        </select>`;
                    } else if (key === 'Nama Barang (Auto)') {
                        inputHtml = `<input type="text" name="${key}" value="${item[key] || ''}" readonly class="w-full border p-2 rounded bg-gray-100 cursor-not-allowed text-[9pt]">`;
                    } else if (key === 'Jumlah') {
                        inputHtml = `<input type="number" name="${key}" value="${item[key] || 0}" class="w-full border p-2 rounded text-[9pt]" required>`;
                    } else {
                        inputHtml = `<input type="text" name="${key}" value="${item[key] || ''}" class="w-full border p-2 rounded text-[9pt]">`;
                    }
                } 
                else {
                    if (currentSection === 'project' && key === 'Kode Project') {
                        let initialCode = item[key];
                        if (index === -1 && !initialCode) {
                            initialCode = generateProjectCode();
                        }
                        inputHtml = `<input type="text" name="${key}" value="${initialCode}" class="w-full border p-2 rounded bg-gray-100 cursor-not-allowed text-[9pt]" readonly required>`;
                    } else {
                        inputHtml = `<input type="text" name="${key}" value="${item[key] || ''}" class="w-full border p-2 rounded text-[9pt]" required>`;
                    }
                }

                form.innerHTML += `<div>
                    <label class="block text-[9pt] font-medium mb-1 text-gray-700">${key}</label>
                    ${inputHtml}
                </div>`;
            });
            
            document.getElementById('modal').classList.remove('hidden');

            if (currentSection === 'transaksi' && index !== -1) {
                if (item['Kategori']) {
                    onKategoriChange(item['Kategori']);
                    document.querySelector('select[name="Jenis"]').value = item['Jenis'] || '';
                }
                if (item['Jenis']) {
                    onJenisChange(item['Jenis']);
                    document.querySelector('select[name="Kode Barang"]').value = item['Kode Barang'] || '';
                }
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveData() {
            const form = document.getElementById('data-form');
            
            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const formData = new FormData(form);
            let newItem = {};
            for (let [key, value] of formData.entries()) { newItem[key] = value; }

            if(currentSection === 'transaksi') {
                let docVal = newItem['No Doc'] ? newItem['No Doc'].trim() : '';
                if(!docVal) {
                    newItem['No Doc'] = generateUniqueDocCode();
                } else {
                    // PERMINTAAN 5: Penambahan (X00) berurutan jika duplikat
                    let baseDoc = docVal;
                    let isDuplicate = db.transaksi.some((t, idx) => t['No Doc'] === baseDoc && idx !== editIndex);
                    
                    if(isDuplicate) {
                        let counter = 1;
                        let newDoc = "";
                        let stillDuplicate = true;
                        
                        while(stillDuplicate) {
                            // Format: (X01), (X02), dst.
                            let suffix = `(X${counter.toString().padStart(2, '0')})`; 
                            newDoc = `${baseDoc} ${suffix}`;
                            stillDuplicate = db.transaksi.some((t, idx) => t['No Doc'] === newDoc && idx !== editIndex);
                            counter++;
                        }
                        newItem['No Doc'] = newDoc;
                        alert(`No Doc sudah digunakan! Sistem otomatis mengubahnya menjadi: ${newDoc}`);
                    }
                }
            }

           // ... (di dalam fungsi saveData)
            if (editIndex === -1) {
                if(currentSection === 'transaksi' && !newItem['ID (Auto)']) newItem['ID (Auto)'] = 'TX-' + Date.now().toString().slice(-5);
                db[currentSection].push(newItem);
            }
            else {
                db[currentSection][editIndex] = newItem;
            }

            saveToLocal(); // Tetap simpan lokal jika perlu (opsional)
            syncToFirebase(); // <--- TAMBAHKAN INI UNTUK KIRIM KE FIREBASE
            syncToGoogleSheet(newItem, currentSection);
            closeModal();
           renderDashboard(); // Render ulang tampilan tabel/dashboard
        } 
           
// Fungsi untuk sinkronisasi ke Firebase
function syncToFirebase() {
    const dbRef = fbRef(fbDb, 'data_aplikasi');
    fbSet(dbRef, db).then(() => {
        console.log("Data berhasil tersimpan di Firebase!");
    }).catch((error) => {
        console.error("Gagal simpan ke Firebase:", error);
    });
}

// Tambahkan fungsi untuk memuat data dari Firebase saat aplikasi dibuka
function loadFromFirebase() {
    fbGet(fbChild(fbRef(fbDb), 'data_aplikasi')).then((snapshot) => {
        if (snapshot.exists()) {
            db = snapshot.val();
            renderDashboard(); // Render ulang setelah data didapat
        } else {
            console.log("Tidak ada data di Firebase, menggunakan data awal.");
        }
    });
}
        renderDashboard();
    </script>
