<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        .table-compact th, .table-compact td { padding: 0.25rem 0.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- ================= FORM LOGIN ================= -->
    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-100">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-indigo-900">WMS Login</h1>
                <p class="text-xs text-gray-500 mt-1">PT Acero Cetha Metalindo</p>
            </div>
            
            <div id="login-error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded text-xs mb-4"></div>

            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="login-email" required class="w-full border p-2.5 rounded text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="admin@acero.com">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="login-password" required class="w-full border p-2.5 rounded text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-indigo-800 hover:bg-indigo-700 text-white font-bold py-2.5 rounded text-sm transition duration-200">
                    Masuk
                </button>
            </form>
        </div>
    </div>

    <!-- ================= APLIKASI UTAMA ================= -->
    <div id="app-section" class="hidden max-w-7xl mx-auto p-4 md:p-8">
        <header class="fixed top-0 left-0 right-0 z-50 bg-indigo-900 text-white p-4 md:px-8 shadow-lg flex justify-between items-center max-w-7xl mx-auto md:rounded-t-xl">
            <div>
                <h1 class="text-xl md:text-2xl font-bold">Warehouse Management System</h1>
                <p class="text-xs text-indigo-200 mt-0.5">Selamat Datang : <span id="user-email-text" class="font-semibold"></span></p>
            </div>
            <div class="flex items-center space-x-2">
                <button onclick="renderDashboard()" class="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded text-[9pt] transition">Dashboard</button>
                <button onclick="handleLogout()" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded text-[9pt] transition">Logout</button>
            </div>
        </header>

        <div class="h-24"></div>

        <main id="main-content" class="bg-white p-6 rounded-b-xl shadow-md min-h-[500px]">
        </main>
        
        <footer class="mt-6 text-[9pt] text-gray-500 text-left">
            &copy; 2026 Acero Cetha Metalindo. Hak Cipta Dilindungi.
        </footer>
    </div>

    <!-- ================= MODAL EDIT/TAMBAH DATA ================= -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-5xl shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 id="modal-title" class="text-[11pt] font-bold mb-4">Edit Data</h2>
            <div id="modal-body">
                <form id="data-form">
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-xs font-bold text-gray-700">Daftar Material (Kategori, Jenis, Kode Barang, Jumlah)</label>
                            <button type="button" onclick="tambahBarisMaterial()" class="bg-green-600 hover:bg-green-500 text-white px-3 py-1 rounded text-xs transition">
                                + Tambah Baris Material
                            </button>
                        </div>
                        <div id="material-rows-container" class="space-y-2">
                            <!-- Baris material dimuat dinamis -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="mt-6 flex justify-end space-x-3 border-t pt-4">
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300 text-[9pt]">Tutup</button>
                <button id="btn-save" onclick="saveData()" class="px-4 py-2 bg-indigo-700 text-white rounded hover:bg-indigo-600 text-[9pt]">Simpan</button>
            </div>
        </div>
    </div>

    <!-- ================= SCRIPT PERBAIKAN POPULATE KODE BARANG & STOK ================= -->
    <script>
        // Fungsi untuk menambah baris material (mendukung parameter lengkap untuk mode Edit)
        function tambahBarisMaterial(kategori = '', jenis = '', kodeBarang = '', jumlah = '') {
            const container = document.getElementById('material-rows-container');
            const rowIndex = Date.now() + Math.random(); 
            
            const rowHTML = `
                <div id="row-${rowIndex}" class="flex items-center space-x-2 bg-gray-50 p-2 rounded border">
                    <!-- Kategori -->
                    <select class="border p-2 rounded text-xs w-1/4 cat-select" onchange="updateStokOtomatis(${rowIndex})">
                        <option value="">Pilih Kategori</option>
                        <option value="Plat" ${kategori === 'Plat' ? 'selected' : ''}>Plat</option>
                        <option value="Pipa" ${kategori === 'Pipa' ? 'selected' : ''}>Pipa</option>
                        <option value="Besi Profil" ${kategori === 'Besi Profil' ? 'selected' : ''}>Besi Profil</option>
                    </select>

                    <!-- Jenis -->
                    <select class="border p-2 rounded text-xs w-1/4 type-select" onchange="updateStokOtomatis(${rowIndex})">
                        <option value="">Pilih Jenis</option>
                        <option value="Stainless" ${jenis === 'Stainless' ? 'selected' : ''}>Stainless</option>
                        <option value="Galvanis" ${jenis === 'Galvanis' ? 'selected' : ''}>Galvanis</option>
                        <option value="Hitam" ${jenis === 'Hitam' ? 'selected' : ''}>Hitam</option>
                    </select>

                    <!-- Kode Barang (Diperbaiki agar langsung terpilih nilainya saat diedit) -->
                    <select class="border p-2 rounded text-xs w-1/4 code-select" onchange="updateStokOtomatis(${rowIndex})">
                        <option value="">Pilih Kode Barang</option>
                        <option value="BAR-001" ${kodeBarang === 'BAR-001' ? 'selected' : ''}>BAR-001 (Stok: 100)</option>
                        <option value="BAR-002" ${kodeBarang === 'BAR-002' ? 'selected' : ''}>BAR-002 (Stok: 50)</option>
                        <option value="BAR-003" ${kodeBarang === 'BAR-003' ? 'selected' : ''}>BAR-003 (Stok: 75)</option>
                    </select>

                    <!-- Jumlah -->
                    <input type="number" placeholder="Jumlah" value="${jumlah}" class="border p-2 rounded text-xs w-1/6 qty-input" oninput="updateStokOtomatis(${rowIndex})">

                    <!-- Tombol Hapus -->
                    <button type="button" onclick="hapusBarisMaterial(${rowIndex})" class="bg-red-500 hover:bg-red-400 text-white px-2.5 py-2 rounded text-xs">X</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', rowHTML);
        }

        // Fungsi untuk menghapus baris material
        function hapusBarisMaterial(rowIndex) {
            const row = document.getElementById(`row-${rowIndex}`);
            if (row) {
                row.remove();
            }
        }

        // Fungsi otomatis memperbarui sisa stok secara real-time
        function updateStokOtomatis(rowIndex) {
            const row = document.getElementById(`row-${rowIndex}`);
            const kategori = row.querySelector('.cat-select').value;
            const jenis = row.querySelector('.type-select').value;
            const kodeBarang = row.querySelector('.code-select').value;
            const jumlah = parseFloat(row.querySelector('.qty-input').value) || 0;

            if (kodeBarang) {
                console.log(`Update Stok -> Kategori: ${kategori}, Jenis: ${jenis}, Kode: ${kodeBarang}, Qty: ${jumlah}`);
            }
        }

        // Fungsi yang dipanggil saat membuka modal Edit Data Transaksi
        function bukaModalEdit(dataTransaksi) {
            document.getElementById('material-rows-container').innerHTML = '';
            document.getElementById('modal-title').innerText = 'Edit Data Transaksi';

            // Pastikan properti penampung item sesuai dengan struktur data Anda (misal: items, details, atau materialList)
            const listItems = dataTransaksi.items || dataTransaksi.details || [];

            if (listItems.length > 0) {
                listItems.forEach(item => {
                    // Masukkan nilai kategori, jenis, kode barang, dan jumlah secara presisi ke fungsi tambahBarisMaterial
                    tambahBarisMaterial(
                        item.kategori || item.category || '', 
                        item.jenis || item.type || '', 
                        item.kodeBarang || item.code || item.itemCode || '', 
                        item.jumlah || item.qty || ''
                    );
                });
            } else {
                tambahBarisMaterial();
            }

            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
    </script>

    <!-- ================= PEMANGGILAN MODUL EXTERNAL ================= -->
    <script type="module" src="auth.js"></script>
    <script src="warehouse.js"></script>
</body>
</html>
